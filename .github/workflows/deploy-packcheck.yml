name: Deploy to packcheck.app

on:
  push:
    branches: [claude/beautiful-babbage-biA91]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_TOKEN: ${{ secrets.PACKCHECK_DEPLOY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Configure git credentials
        run: |
          git config user.email "deploy@packcheck.app"
          git config user.name "Packcheck Deploy"
          git config --global credential.helper store
          printf 'https://x-access-token:%s@github.com\n' "$DEPLOY_TOKEN" > ~/.git-credentials

      - name: Prepare splash output
        run: |
          mkdir -p /tmp/splash-deploy
          cp splash/index.html /tmp/splash-deploy/index.html
          cp splash/CNAME /tmp/splash-deploy/CNAME

      - name: Push to packcheck.app repo
        run: |
          cd /tmp/splash-deploy
          git init
          git config user.email "deploy@packcheck.app"
          git config user.name "Packcheck Deploy"
          git config credential.helper store
          printf 'https://x-access-token:%s@github.com\n' "$DEPLOY_TOKEN" > ~/.git-credentials
          git add .
          git commit -m "Deploy splash to packcheck.app"
          git remote add origin https://github.com/rhoegee/packcheck.app.git
          git push origin HEAD:main --force
